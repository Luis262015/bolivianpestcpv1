<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#013147;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#02425f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#00b894" opacity="0.1" />
  <circle cx="1100" cy="530" r="250" fill="#00b894" opacity="0.1" />
  <circle cx="1050" cy="80" r="150" fill="#ffffff" opacity="0.05" />

  <!-- Logo circle -->
  <circle cx="600" cy="200" r="100" fill="none" stroke="#00b894" stroke-width="8" />
  <path d="M560 200 L580 220 L640 160" stroke="#00b894" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Company name -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">Bolivian Pest</text>
  <text x="600" y="440" font-family="Arial, sans-serif" font-size="36" fill="#00b894" text-anchor="middle">Control de Plagas Profesional</text>

  <!-- Contact info -->
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" opacity="0.8" text-anchor="middle">+591 76738282 | info@bolivianpest.com</text>

  <!-- Tagline -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="24" fill="#00b894" text-anchor="middle">Hogares y Negocios Libres de Plagas</text>
</svg>
